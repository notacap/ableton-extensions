<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Chord Reharmonizer</title>
<style>
  :root {
    /* ── Nebula theme ───────────────────────────────────
       Deep-space indigo chrome; the 12 chord hues are the
       stars. Violet = commit, comet-ice = transport.      */
    --bg: #07040f;
    --bg-2: #150d31;
    --surface: rgba(255,255,255,0.045);
    --surface-2: rgba(255,255,255,0.085);
    --input-bg: rgba(8,4,22,0.65);
    --border: rgba(255,255,255,0.13);
    --border-soft: rgba(255,255,255,0.07);
    --text: #ece8fb;
    --text-dim: #9b8fc7;
    --accent: #c9a6ff;        /* nebula violet — commit actions */
    --accent-2: #ff8bd6;      /* magenta flare */
    --accent-ink: #1c0b33;
    --play: #7fd8ff;          /* comet ice — listen/transport */
    --play-ink: #03222e;
    --glow: rgba(201,166,255,0.32);
    --star: #ffe3a8;          /* suggestion star */
    --h: 270;                 /* fallback chord hue */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    font-size: 12px; user-select: none;
  }
  body {
    display: flex; flex-direction: column; padding: 12px 14px; gap: 10px;
    background: linear-gradient(170deg, var(--bg) 0%, var(--bg-2) 135%);
    overflow: hidden;
  }
  /* Drifting nebula — gas clouds in slow orbit. */
  body::before {
    content: ""; position: fixed; inset: -40%;
    background:
      radial-gradient(36% 32% at 22% 28%, rgba(168,92,255,0.16), transparent 70%),
      radial-gradient(30% 34% at 80% 20%, rgba(255,92,180,0.12), transparent 70%),
      radial-gradient(34% 30% at 72% 82%, rgba(72,150,255,0.13), transparent 70%),
      radial-gradient(26% 28% at 14% 80%, rgba(64,220,235,0.10), transparent 70%);
    animation: nebula 52s ease-in-out infinite alternate;
    pointer-events: none; z-index: 0;
  }
  @keyframes nebula {
    0%   { transform: rotate(0deg)   scale(1.00); }
    50%  { transform: rotate(-6deg)  scale(1.12); }
    100% { transform: rotate(5deg)   scale(1.05); }
  }
  /* Starfield — pinpricks that breathe. */
  body::after {
    content: ""; position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 11% 18%, rgba(255,255,255,0.9), transparent 60%),
      radial-gradient(1px 1px at 28% 64%, rgba(255,255,255,0.6), transparent 60%),
      radial-gradient(2px 2px at 41% 32%, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(1px 1px at 55% 75%, rgba(255,255,255,0.7), transparent 60%),
      radial-gradient(1px 1px at 63% 12%, rgba(255,255,255,0.8), transparent 60%),
      radial-gradient(2px 2px at 74% 48%, rgba(255,255,255,0.45), transparent 60%),
      radial-gradient(1px 1px at 86% 26%, rgba(255,255,255,0.7), transparent 60%),
      radial-gradient(1px 1px at 92% 68%, rgba(255,255,255,0.6), transparent 60%),
      radial-gradient(1px 1px at 18% 88%, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(1px 1px at 48% 92%, rgba(255,255,255,0.6), transparent 60%);
    animation: twinkle 8s ease-in-out infinite alternate;
    pointer-events: none; z-index: 0;
  }
  @keyframes twinkle { from { opacity: .35; } to { opacity: .9; } }
  body > * { position: relative; z-index: 1; }

  /* ── Header ─────────────────────────────────────────── */
  .header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .title {
    font-size: 15px; font-weight: 700; letter-spacing: .02em;
    background: linear-gradient(90deg, #c9a6ff, #ff8bd6 50%, #7fd8ff);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .clip-badge {
    background: var(--surface); color: var(--text-dim);
    border: 1px solid var(--border-soft); border-radius: 999px;
    font-size: 10px; padding: 2px 9px;
  }
  .live-badge {
    background: rgba(127,216,255,0.10); color: var(--play);
    border: 1px solid rgba(127,216,255,0.28); border-radius: 999px;
    font-size: 10px; padding: 2px 9px;
  }
  .hidden { display: none !important; }
  .spacer-h { margin-left: auto; }
  .field { display: flex; align-items: center; gap: 5px; }
  .field label { color: var(--text-dim); font-size: 11px; }
  select {
    background: var(--input-bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 7px;
    padding: 4px 6px; font-size: 12px; outline: none; max-width: 200px;
  }
  .toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; color: var(--text-dim); font-size: 11px; white-space: nowrap; }
  .toggle input { accent-color: var(--accent); }

  /* ── Panels ─────────────────────────────────────────── */
  .panel { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 10px 11px; }
  .panel-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 7px; }
  .panel-head h2 { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-dim); margin: 0; font-weight: 600; }
  .panel-head .hint { font-size: 10px; color: var(--text-dim); opacity: .8; font-style: italic; }
  .mini-btn {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 999px; padding: 2px 10px; cursor: pointer; font-size: 10px;
  }
  .mini-btn:hover { color: var(--text); border-color: var(--accent); }

  /* ── Timeline ───────────────────────────────────────── */
  #timeArea { position: relative; cursor: crosshair; touch-action: none; }
  #ruler { position: relative; height: 15px; margin-bottom: 2px; }
  #ruler .bar { position: absolute; top: 0; bottom: 0; border-left: 1px solid rgba(255,255,255,0.22); padding-left: 4px; color: var(--text-dim); font-size: 9px; pointer-events: none; }
  #ruler .beat { position: absolute; top: 8px; bottom: 0; border-left: 1px solid rgba(255,255,255,0.08); pointer-events: none; }
  #track { position: relative; height: 58px; background: var(--input-bg); border-radius: 9px; overflow: hidden; border: 1px solid var(--border-soft); }
  /* Blocks are display-only: pointer-events off so they can never hijack a drag.
     Selection is hit-tested in JS by beat position instead. */
  .blk {
    position: absolute; top: 4px; bottom: 4px; border-radius: 8px;
    background: linear-gradient(160deg, hsla(var(--h),58%,58%,0.30), hsla(var(--h),58%,38%,0.10));
    border: 1px solid hsla(var(--h),58%,66%,0.45);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    overflow: hidden; pointer-events: none;
    transition: opacity .15s, filter .15s;
  }
  .blk .nm { font-weight: 700; font-size: 11px; white-space: nowrap; color: hsl(var(--h),80%,86%); }
  .blk .rm { font-size: 9px; color: hsla(var(--h),50%,76%,0.9); }
  .blk.muted { opacity: .18; filter: grayscale(.7); }
  .blk.playing { box-shadow: 0 0 0 1px hsla(var(--h),80%,72%,0.9), 0 0 16px hsla(var(--h),80%,62%,0.5); }

  /* Selection overlay spans ruler + track; only handles/body take pointer events. */
  #selOverlay { position: absolute; top: 0; bottom: 0; pointer-events: none; display: none; z-index: 5; }
  #selOverlay .body {
    position: absolute; top: 0; bottom: 0; left: 0; right: 0;
    background: rgba(201,166,255,0.10);
    border-top: 2px solid var(--accent);
    border-bottom: 2px solid var(--accent);
    border-radius: 2px;
    pointer-events: auto; cursor: grab; z-index: 1;
  }
  #selOverlay .body:active { cursor: grabbing; }
  /* Ghost row — your rewrite, previewed in place over the dimmed originals. */
  #ghostRow {
    position: absolute; left: 2px; right: 2px; top: 20px; bottom: 7px;
    display: flex; gap: 3px; pointer-events: none; z-index: 2;
  }
  #selOverlay.dragging #ghostRow { display: none; }
  .ghost {
    border-radius: 7px; min-width: 0; overflow: hidden;
    background: linear-gradient(160deg, hsla(var(--h),65%,62%,0.55), hsla(var(--h),65%,42%,0.25));
    border: 1px solid hsla(var(--h),80%,74%,0.85);
    box-shadow: 0 0 9px hsla(var(--h),70%,60%,0.35);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 10px; color: hsl(var(--h),85%,90%);
    white-space: nowrap;
  }
  .ghost.orig-ghost { border-style: dashed; opacity: .85; }
  .ghost.playing { box-shadow: 0 0 0 1px hsla(var(--h),85%,78%,1), 0 0 18px hsla(var(--h),85%,65%,0.65); }
  .ghost-empty {
    flex: 1; border-radius: 7px; border: 1px dashed rgba(255,255,255,0.25);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 10px; font-style: italic;
  }
  #selOverlay .handle {
    position: absolute; top: 0; bottom: 0; width: 16px; z-index: 6;
    pointer-events: auto; cursor: ew-resize;
    display: flex; align-items: center; justify-content: center;
  }
  #selOverlay .handle.left { left: -8px; }
  #selOverlay .handle.right { right: -8px; }
  #selOverlay .handle::before {
    content: ""; width: 5px; height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--accent-2));
    box-shadow: 0 0 8px var(--glow);
    border-radius: 3px;
  }
  #selOverlay .handle::after {
    content: "⋮"; position: absolute; color: var(--accent-ink);
    font-size: 12px; font-weight: 700; line-height: 1;
  }
  /* Playhead — a comet sweeping the strip while you listen. */
  #playline {
    position: absolute; top: 0; bottom: 0; width: 2px; display: none;
    background: linear-gradient(180deg, var(--play), rgba(127,216,255,0.1));
    box-shadow: 0 0 9px rgba(127,216,255,0.8);
    pointer-events: none; z-index: 9;
  }
  .sel-info { font-size: 10px; color: var(--text-dim); }

  /* ── Middle grid ────────────────────────────────────── */
  #mid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 10px; flex: 1; min-height: 0; }
  .col { display: flex; flex-direction: column; min-height: 0; }

  /* ── Rewrite cards ──────────────────────────────────── */
  #cards { display: flex; flex-wrap: wrap; gap: 7px; align-content: flex-start; min-height: 64px; flex: 1; overflow-y: auto; }
  .card {
    position: relative; width: 96px; min-height: 72px;
    background: linear-gradient(160deg, hsla(var(--h),55%,58%,0.24), hsla(var(--h),55%,40%,0.08));
    border: 1px solid hsla(var(--h),55%,65%,0.45);
    border-radius: 10px; padding: 7px 8px 6px; cursor: grab;
    display: flex; flex-direction: column; gap: 2px;
    transition: border-color .12s, box-shadow .12s, transform .12s;
  }
  .card:hover { transform: translateY(-1px); }
  .card.selected {
    border-color: hsla(var(--h),80%,74%,0.95);
    box-shadow: 0 0 0 1px hsla(var(--h),80%,74%,0.85), 0 0 14px hsla(var(--h),70%,60%,0.30);
  }
  .card.playing { animation: cardPulse 1s ease-in-out infinite; transform: translateY(-2px); }
  @keyframes cardPulse {
    0%, 100% { box-shadow: 0 0 0 1px hsla(var(--h),80%,72%,0.9), 0 0 12px hsla(var(--h),80%,62%,0.35); }
    50%      { box-shadow: 0 0 0 2px hsla(var(--h),85%,76%,1.0), 0 0 24px hsla(var(--h),85%,65%,0.55); }
  }
  .card.orig-card { border-style: dashed; }
  .card.dragover { border-color: var(--star); }
  .card .c-name { font-size: 13px; font-weight: 700; color: hsl(var(--h),80%,86%); }
  .card .c-roman { font-size: 9px; color: hsla(var(--h),55%,76%,0.85); }
  .card .voice-strip { display: flex; gap: 2px; margin-top: auto; padding-top: 3px; height: 13px; align-items: flex-end; }
  .card .voice-strip span { flex: 1; background: hsl(var(--h),65%,68%); border-radius: 1px; opacity: .7; }
  .card .beats-tag {
    position: absolute; bottom: 3px; right: 5px; font-size: 9px;
    color: var(--text-dim); background: var(--input-bg);
    border-radius: 3px; padding: 0 3px;
  }
  .card .x {
    position: absolute; top: 2px; right: 4px; width: 14px; height: 14px;
    line-height: 13px; text-align: center; border-radius: 3px;
    color: var(--text-dim); font-size: 11px; cursor: pointer;
  }
  .card .x:hover { background: #3a2240; color: #ffc2e0; }
  /* 📌 pin — survives the dice. Faint until hovered; lit + gold ring when on. */
  .card .pin {
    position: absolute; top: 2px; left: 4px; width: 15px; height: 15px;
    line-height: 14px; text-align: center; border-radius: 3px;
    font-size: 9px; cursor: pointer;
    opacity: 0; filter: grayscale(1) brightness(1.5);
    transition: opacity .12s, filter .12s;
  }
  .card:hover .pin { opacity: .55; }
  .card .pin:hover { opacity: 1; background: #3a2240; }
  .card.pinned .pin { opacity: 1; filter: none; }
  .card.pinned:not(.selected) { border-color: rgba(255,227,168,0.75); box-shadow: 0 0 9px rgba(255,227,168,0.18); }
  .cards-empty { color: var(--text-dim); font-style: italic; padding: 18px 6px; font-size: 11px; }

  /* ── Inspector (selected card editor) — plain words, no mystery glyphs ── */
  .inspector {
    margin-top: 8px; padding: 8px 10px; border-radius: 10px;
    background: var(--surface-2); border: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 6px;
  }
  .insp-head { display: flex; align-items: center; gap: 6px; }
  .insp-title { font-weight: 700; font-size: 12px; color: var(--accent); }
  .insp-sub { font-size: 10px; color: var(--text-dim); }
  .ctl-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctl-label { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); width: 48px; flex: none; }
  .vbtn {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 3px 10px; cursor: pointer; font-size: 10px;
    transition: filter .1s, transform .1s;
  }
  .vbtn:hover { filter: brightness(1.35); transform: translateY(-1px); }
  .vbtn.active { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  .vbtn:disabled { opacity: .3; cursor: default; transform: none; }
  .vbtn.danger:hover { border-color: #ff8bb0; color: #ffc2d6; }
  .insp-beats { font-size: 11px; color: var(--text); min-width: 66px; text-align: center; }

  .tools { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .fieldlab { display: flex; align-items: center; gap: 5px; color: var(--text-dim); font-size: 11px; }
  .fieldlab input[type=range] { width: 70px; accent-color: var(--accent); }

  /* ── Ideas panel ────────────────────────────────────── */
  .tabs { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }
  .tabs button {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
    border-radius: 999px; padding: 4px 11px; cursor: pointer; font-size: 11px;
  }
  .tabs button:hover { color: var(--text); }
  .tabs button.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
  .dice-btn {
    background: linear-gradient(135deg, rgba(255,139,214,0.20), rgba(168,92,255,0.20));
    border: 1px solid rgba(255,139,214,0.4); color: var(--text);
    border-radius: 999px; padding: 4px 12px; cursor: pointer; font-size: 11px;
    transition: box-shadow .12s, transform .12s;
  }
  .dice-sel {
    background: var(--surface-2); color: var(--text-dim);
    border: 1px solid rgba(255,139,214,0.25); border-radius: 999px;
    padding: 3px 5px; font-size: 10px; max-width: 76px;
  }
  .dice-sel:hover { color: var(--text); border-color: rgba(255,139,214,0.55); }
  .dice-btn:hover { box-shadow: 0 0 12px rgba(255,139,214,0.35); transform: translateY(-1px); }
  .tip { color: var(--text-dim); font-size: 10px; margin: 0 0 7px; min-height: 13px; font-style: italic; }
  #tabBody { flex: 1; min-height: 0; overflow-y: auto; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    position: relative;
    background: linear-gradient(155deg, hsla(var(--h),55%,55%,0.20), hsla(var(--h),55%,40%,0.06));
    border: 1px solid hsla(var(--h),55%,62%,0.40); border-radius: 9px;
    padding: 6px 10px; cursor: pointer;
    transition: transform .1s, box-shadow .1s, border-color .1s;
  }
  .chip:hover {
    transform: translateY(-2px);
    border-color: hsla(var(--h),80%,72%,0.85);
    box-shadow: 0 4px 14px hsla(var(--h),70%,55%,0.25);
  }
  .chip:active { transform: translateY(0) scale(0.97); }
  .chip b { font-weight: 700; font-size: 12px; color: hsl(var(--h),80%,86%); }
  .chip small { color: var(--text-dim); margin-left: 5px; font-size: 9px; }
  .chip.sug { border-color: var(--star); box-shadow: 0 0 10px rgba(255,227,168,0.16); }
  .chip.sug::after { content: "★"; position: absolute; top: 1px; right: 4px; font-size: 8px; color: var(--star); }
  .chip.armed { border-color: hsla(var(--h),85%,75%,0.95); box-shadow: 0 0 12px hsla(var(--h),75%,60%,0.35); }
  .chip .chip-add {
    display: inline-block; margin-left: 7px; padding: 0 5px;
    border: 1px solid hsla(var(--h),55%,62%,0.45); border-radius: 6px;
    color: var(--text-dim); font-size: 11px; font-weight: 700; line-height: 14px;
  }
  .chip .chip-add:hover { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .pal-label { font-size: 9px; text-transform: uppercase; letter-spacing: .07em; color: var(--text-dim); margin: 0 0 5px; }
  .pal-gap { height: 9px; }

  /* ── Footer ─────────────────────────────────────────── */
  .footer { display: flex; gap: 9px; align-items: center; }
  .spacer { margin-left: auto; }
  .tempo-tag { color: var(--text-dim); font-size: 11px; }
  button.action {
    border: 1px solid var(--border); border-radius: 999px; padding: 7px 16px;
    cursor: pointer; font-size: 12px; font-weight: 600;
    transition: box-shadow .12s, filter .12s;
  }
  .btn-play {
    background: rgba(127,216,255,0.12); color: var(--play);
    border-color: rgba(127,216,255,0.38); min-width: 108px;
  }
  .btn-play:hover { box-shadow: 0 0 14px rgba(127,216,255,0.30); }
  .btn-play.playing { background: var(--play); color: var(--play-ink); border-color: var(--play); box-shadow: 0 0 16px rgba(127,216,255,0.45); }
  .btn-section {
    background: transparent; color: var(--play);
    border-color: rgba(127,216,255,0.25); font-weight: 500;
  }
  .btn-section:hover { box-shadow: 0 0 10px rgba(127,216,255,0.22); }
  .btn-write {
    background: linear-gradient(135deg, #c9a6ff, #ff8bd6); color: var(--accent-ink);
    border-color: transparent; box-shadow: 0 0 14px var(--glow);
  }
  .btn-write:hover { filter: brightness(1.08); box-shadow: 0 0 20px var(--glow); }
  .btn-write:disabled { opacity: .35; cursor: default; box-shadow: none; }
  .btn-ghost { background: transparent; color: var(--text-dim); border-color: transparent; }
  .btn-ghost:hover { color: var(--text); }
  .btn-keep {
    background: rgba(154,255,203,0.10); color: #9affcb;
    border-color: rgba(154,255,203,0.35);
  }
  .btn-keep:hover { box-shadow: 0 0 12px rgba(154,255,203,0.25); }
  .btn-keep:disabled { opacity: .35; cursor: default; box-shadow: none; }
  .edits-tag { color: #9affcb; font-size: 10px; white-space: nowrap; }
  .apply-group { display: flex; align-items: center; gap: 6px; }
  .status { color: var(--accent); font-size: 11px; font-style: italic; }
  .kbd-hints { color: var(--text-dim); font-size: 10px; opacity: .7; }
</style>
</head>
<body>
  <div class="header">
    <div class="title">✦ Chord Reharmonizer</div>
    <span class="clip-badge" id="clipBadge"></span>
    <span class="live-badge hidden" id="liveBadge"></span>
    <span class="spacer-h"></span>
    <div class="field"><label>Key</label><select id="keyRoot"></select><select id="keyMode"></select></div>
    <div class="field"><label>Sound</label>
      <select id="soundSel">
        <option value="piano">Piano</option>
        <option value="ep">Electric Piano</option>
        <option value="synth">Synth</option>
        <option value="none">Muted</option>
      </select>
    </div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <h2>Your progression</h2>
      <span class="hint">tap a chord — or drag across the strip — to choose the moment to reimagine · shift-click just listens</span>
      <span class="spacer-h"></span>
      <span class="sel-info" id="selInfo"></span>
      <button class="mini-btn hidden" id="selClearBtn" title="Clear the selection">✕ clear</button>
      <button class="mini-btn" id="dupLoopBtn" title="Repeat the whole progression once — 2 bars become 4, 4 become 8. Undoable with ↩, written to Live on ✦ Drop it in">⧉ ×2 loop</button>
    </div>
    <div id="timeArea">
      <div id="ruler"></div>
      <div id="track"></div>
      <div id="selOverlay">
        <div class="body" title="Drag to slide the selection"></div>
        <div id="ghostRow"></div>
        <div class="handle left" title="Drag to adjust where the rewrite starts"></div>
        <div class="handle right" title="Drag to adjust where the rewrite ends"></div>
      </div>
      <div id="playline"></div>
    </div>
  </div>

  <div id="mid">
    <div class="panel col">
      <div class="panel-head">
        <h2>The rewrite</h2>
