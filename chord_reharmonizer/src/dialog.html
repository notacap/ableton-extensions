<script>
"use strict";
const ALL_DATA = /*__DATA__*/null;
const { roots: ROOTS, modes: MODES, palette: PALETTE, live: LIVE, clip: CLIP } = ALL_DATA;

const EPS = 1e-6;
const BEATS_PER_BAR = 4;            // SDK does not expose time signature; assume 4/4
const NOTE_FLAT  = ["C","D♭","D","E♭","E","F","G♭","G","A♭","A","B♭","B"];
const NOTE_SHARP = ["C","C♯","D","D♯","E","F","F♯","G","G♯","A","A♯","B"];
const PC = { C:0,"C#":1,"C♯":1,Db:1,"D♭":1,D:2,"D#":3,"D♯":3,Eb:3,"E♭":3,E:4,F:5,"F#":6,"F♯":6,Gb:6,"G♭":6,G:7,"G#":8,"G♯":8,Ab:8,"A♭":8,A:9,"A#":10,"A♯":10,Bb:10,"B♭":10,B:11 };
function pcOf(name){ return PC[(name||"").replace(/[0-9]/g,"")] ?? 0; }
function asc(a){ return a.slice().sort((x,y)=>x-y); }
function avg(a){ return a.reduce((x,y)=>x+y,0)/a.length; }
function fmt(x){ return (+x.toFixed(2)).toString(); }

// Chord type → semitone intervals (used for voicing + detection in the webview).
const CHORD_INTERVALS = {
  maj7:[0,4,7,11], m7:[0,3,7,10], "7":[0,4,7,10], m7b5:[0,3,6,10], dim7:[0,3,6,9],
  mMaj7:[0,3,7,11], "maj7#5":[0,4,8,11], maj:[0,4,7], m:[0,3,7], dim:[0,3,6],
  aug:[0,4,8], "6":[0,4,7,9], m6:[0,3,7,9]
};
const TYPE_SUFFIX = {
  maj7:"maj7", m7:"m7", "7":"7", m7b5:"m7♭5", dim7:"°7", mMaj7:"mMaj7",
  "maj7#5":"maj7♯5", maj:"", m:"m", dim:"°", aug:"+", "6":"6", m6:"m6"
};
const DEG_ROMAN = ["I","♭II","II","♭III","III","IV","♯IV","V","♭VI","VI","♭VII","VII"];

// Circle-of-fifths color wheel: harmonically close chords get chromatically
// close hues, so the timeline reads like a constellation of related colors.
const CO5 = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
function hueOf(rootPc){ return CO5.indexOf(((rootPc % 12) + 12) % 12) * 30; }

// Key-aware spelling, mirroring the extension: in-scale roots always use the
// key's preferred accidentals (PALETTE noteNames — the diatonic palette roots
// double as the scale). For CHROMATIC roots, an explicit accidental in the
// roman hint steers the direction — ♭II7 stays B♭7 in sharp keys, ♯iv°7 stays
// F♯°7 in flat keys. First accidental in the string decides.
function keyNames(){ return curPalette().noteNames || NOTE_FLAT; }
function spellPc(pc, roman){
  pc = ((pc % 12) + 12) % 12;
  const names = keyNames();
  if ((curPalette().diatonic || []).some(c => pcOf(c.rootName) === pc)) return names[pc];
  const r = roman || "";
  const si = r.indexOf("♯"), fi = r.indexOf("♭");
  const arr = si >= 0 && (fi < 0 || si < fi) ? NOTE_SHARP : fi >= 0 ? NOTE_FLAT : names;
  return arr[pc];
}
function nameOf(rootPc, type, roman){ return spellPc(rootPc, roman) + (TYPE_SUFFIX[type] ?? type); }

/** Close voicing matching the extension's algorithm: anchor root into [54..65], stack up. */
function voicing(rootPc, type){
  const ivs = CHORD_INTERVALS[type] || [0,4,7];
  const pcs = ivs.map(i => ((rootPc + i) % 12 + 12) % 12);
  const folded = ((pcs[0] + 6) % 12) - 6;
  let prev = 60 + folded;
  const midi = [prev];
  for (let i = 1; i < pcs.length; i++){
    let step = (pcs[i] - (prev % 12) + 12) % 12;
    if (step === 0) step = 12;
    prev += step; midi.push(prev);
  }
  return midi;
}

// ════════════════════════════════════════════════════════════════════════════
//  CHORD COLOR LAYER — ported from Chord Progression Builder
//  Each chord type exposes a list of "colors": full interval sets in semitones
//  from the chord root, plus a display suffix appended to the card's root name.
//  Computed from the close voicing's anchored root, so colors stay deterministic
//  and in the same register as the base palette. Types CPB doesn't have
//  (6 / m6 / dim / aug — the reharmonizer can DETECT these) get their own sets.
// ════════════════════════════════════════════════════════════════════════════
const CHORD_COLORS = {
  'maj7': [
    { key:'triad', label:'Triad', suf:'',         iv:[0,4,7] },
    { key:'7th',   label:'7th',   suf:'maj7',     iv:[0,4,7,11] },
    { key:'9th',   label:'9th',   suf:'maj9',     iv:[0,4,7,11,14] },
    { key:'13th',  label:'13th',  suf:'maj13',    iv:[0,4,7,11,14,21] },
    { key:'6',     label:'6',     suf:'6',        iv:[0,4,7,9] },
    { key:'69',    label:'6/9',   suf:'6/9',      iv:[0,4,7,9,14] },
    { key:'s11',   label:'♯11',   suf:'maj7♯11',  iv:[0,4,7,11,18] },
    { key:'sus2',  label:'sus2',  suf:'sus2',     iv:[0,2,7] },
  ],
  '7': [
    { key:'triad', label:'Triad', suf:'',      iv:[0,4,7] },
    { key:'7th',   label:'7th',   suf:'7',     iv:[0,4,7,10] },
    { key:'9th',   label:'9th',   suf:'9',     iv:[0,4,7,10,14] },
    { key:'13th',  label:'13th',  suf:'13',    iv:[0,4,10,14,21] },
    { key:'sus4',  label:'sus4',  suf:'7sus4', iv:[0,5,7,10] },
    { key:'b9',    label:'♭9',    suf:'7♭9',   iv:[0,4,7,10,13] },
    { key:'#9',    label:'♯9',    suf:'7♯9',   iv:[0,4,7,10,15] },
  ],
  'm7': [
    { key:'triad', label:'Triad', suf:'m',   iv:[0,3,7] },
    { key:'7th',   label:'7th',   suf:'m7',  iv:[0,3,7,10] },
    { key:'9th',   label:'9th',   suf:'m9',  iv:[0,3,7,10,14] },
    { key:'11th',  label:'11th',  suf:'m11', iv:[0,3,7,10,14,17] },
    { key:'13th',  label:'13th',  suf:'m13', iv:[0,3,7,10,14,21] },
    { key:'6',     label:'6',     suf:'m6',  iv:[0,3,7,9] },
  ],
  'm7b5': [
    { key:'triad', label:'Triad', suf:'°',    iv:[0,3,6] },
    { key:'7th',   label:'7th',   suf:'m7♭5', iv:[0,3,6,10] },
    { key:'11th',  label:'11th',  suf:'ø11',  iv:[0,3,6,10,17] },
  ],
  'dim7': [
    { key:'triad', label:'Triad', suf:'°',  iv:[0,3,6] },
    { key:'7th',   label:'7th',   suf:'°7', iv:[0,3,6,9] },
  ],
  'mMaj7': [
    { key:'triad', label:'Triad', suf:'m',     iv:[0,3,7] },
    { key:'7th',   label:'7th',   suf:'mMaj7', iv:[0,3,7,11] },
    { key:'9th',   label:'9th',   suf:'mMaj9', iv:[0,3,7,11,14] },
  ],
  'maj7#5': [
    { key:'triad', label:'Triad', suf:'+',      iv:[0,4,8] },
    { key:'7th',   label:'7th',   suf:'maj7♯5', iv:[0,4,8,11] },
  ],
  'maj': [
    { key:'triad', label:'Triad', suf:'',     iv:[0,4,7] },
    { key:'add9',  label:'add9',  suf:'add9', iv:[0,4,7,14] },
    { key:'6',     label:'6',     suf:'6',    iv:[0,4,7,9] },
    { key:'sus2',  label:'sus2',  suf:'sus2', iv:[0,2,7] },
    { key:'sus4',  label:'sus4',  suf:'sus4', iv:[0,5,7] },
  ],
  'm': [
    { key:'triad', label:'Triad', suf:'m',       iv:[0,3,7] },
    { key:'add9',  label:'add9',  suf:'m(add9)', iv:[0,3,7,14] },
    { key:'6',     label:'6',     suf:'m6',      iv:[0,3,7,9] },
  ],
  '6': [
    { key:'triad', label:'Triad', suf:'',     iv:[0,4,7] },
    { key:'6',     label:'6',     suf:'6',    iv:[0,4,7,9] },
    { key:'69',    label:'6/9',   suf:'6/9',  iv:[0,4,7,9,14] },
    { key:'7th',   label:'maj7',  suf:'maj7', iv:[0,4,7,11] },
  ],
  'm6': [
    { key:'triad', label:'Triad', suf:'m',    iv:[0,3,7] },
    { key:'6',     label:'6',     suf:'m6',   iv:[0,3,7,9] },
    { key:'69',    label:'6/9',   suf:'m6/9', iv:[0,3,7,9,14] },
  ],
  'dim': [
    { key:'triad', label:'Triad', suf:'°',    iv:[0,3,6] },
    { key:'7th',   label:'°7',    suf:'°7',   iv:[0,3,6,9] },
    { key:'m7b5',  label:'ø7',    suf:'m7♭5', iv:[0,3,6,10] },
  ],
  'aug': [
    { key:'triad', label:'Triad',  suf:'+',      iv:[0,4,8] },
    { key:'7th',   label:'maj7♯5', suf:'maj7♯5', iv:[0,4,8,11] },
    { key:'7s5',   label:'7♯5',    suf:'7♯5',    iv:[0,4,8,10] },
  ],
};

function colorDefs(type){
  return CHORD_COLORS[type] || [{ key:'triad', label:'Triad', suf:null, iv:null }];
}
// The default color is the one whose interval set IS the chord's base type, so
// a freshly seeded card sounds exactly like the chord it represents.
function defaultColorKey(type){
  const base = CHORD_INTERVALS[type] || [0,4,7];
  const defs = colorDefs(type);
  const hit = defs.find(d => d.iv && d.iv.length === base.length && d.iv.every((v,i) => v === base[i]));
  return (hit || defs[0]).key;
}

// ════════════════════════════════════════════════════════════════════════════
//  VOICING TRANSFORMS — ported from Chord Progression Builder
//  Each transform is a deterministic function of a card's colored Close (root
//  position) note set. Always recomputed from that canonical array, so
//  transforms never compound.
// ════════════════════════════════════════════════════════════════════════════
// Bottom `k` notes raised an octave (k=1 → 1st inversion, k=2 → 2nd inversion).
function invert(close, k){
  const s = asc(close);
  for (let i = 0; i < k && i < s.length; i++) s[i] += 12;
  return asc(s);
}

function applyVoicing(notes, rootMidi, vKey){
  const s = asc(notes);
  const ivOf = n => ((n - rootMidi) % 12 + 12) % 12;
  switch (vKey){
    case 'inv1': return invert(s, 1);
    case 'inv2': return invert(s, 2);
    case 'open': { // drop-2: 2nd-from-top voice down an octave
      if (s.length < 3) return s;
      const o = s.slice(); o[o.length - 2] -= 12; return asc(o);
    }
    case 'drop3': { // 3rd-from-top voice down an octave
      if (s.length < 4) return s;
      const o = s.slice(); o[o.length - 3] -= 12; return asc(o);
    }
    case 'wide': { // root dropped an octave — instant pad spread
      const o = s.slice(); o[0] -= 12; return asc(o);
    }
    case 'rootless': { // drop every voice in the root's pitch class
      const out = s.filter(n => ivOf(n) !== 0);
      return out.length >= 2 ? out : s;
    }
    case 'shell': { // root + 3rd (or sus tone) + 7th
      const third = s.find(n => [2, 3, 4, 5].indexOf(ivOf(n)) >= 0 && ivOf(n) !== 0);
      const seventh = s.find(n => ivOf(n) === 10 || ivOf(n) === 11);
      if (third === undefined || seventh === undefined) return s;
      return asc([rootMidi, third, seventh]);
    }
    case 'close':
    default: return s;
  }
}

const VOICING_DEFS = [
  { key: 'close',    label: 'Close' },
  { key: 'inv1',     label: '1st inv' },
  { key: 'inv2',     label: '2nd inv' },
  { key: 'open',     label: 'Open' },
  { key: 'drop3',    label: 'Drop-3', min4: true },
  { key: 'wide',     label: 'Wide' },
  { key: 'rootless', label: 'Rootless', needs7: true },
  { key: 'shell',    label: 'Shell',    needs7: true },
];

// Recompute a card's notes + display name from rootPc/type/color/voicing.
// The default color keeps the card's original name (e.g. "C°7" from detection),
// any other color renames it CPB-style as rootName + suffix.
function recomputeSlot(s){
  const defs = colorDefs(s.type);
  const def = defs.find(d => d.key === s.color) || defs.find(d => d.key === defaultColorKey(s.type)) || defs[0];
  const base = voicing(s.rootPc, s.type);
  const rootMidi = base[0];
  const colored = def.iv ? def.iv.map(x => rootMidi + x) : base.slice();
  s.noteCount = colored.length;
  s.hasSeventh = (def.iv || CHORD_INTERVALS[s.type] || []).some(x => x % 12 === 10 || x % 12 === 11);
  s.midi = applyVoicing(asc(colored), rootMidi, s.voicing);
  s.name = (def.suf == null || def.key === defaultColorKey(s.type)) ? s.baseName : s.rootName + def.suf;
}

/**
 * Best-effort chord identification from a pitch-class set. `bassPc` (the lowest
 * sounding note's pitch class, when known) strongly biases the root: CPB voices
 * every chord in root position, so the bass is almost always the true root —
 * this is what tells Am7 {A C E G} apart from its identical-pc-set twin C6.
 */
function detectChord(pcs, bassPc){
  if (!pcs || !pcs.length) return null;
  const present = new Set(pcs);
  const types = ["maj7","m7","7","m7b5","dim7","mMaj7","maj7#5","6","m6","maj","m","dim","aug"];
  let best = null;
  for (let root = 0; root < 12; root++){
    for (const t of types){
      const ivs = CHORD_INTERVALS[t];
      const chordPcs = ivs.map(i => (root + i) % 12);
      let missing = 0; for (const cp of chordPcs) if (!present.has(cp)) missing++;
      let extra = 0; for (const p of present) if (!chordPcs.includes(p)) extra++;
      const rootPenalty = present.has(root) ? 0 : 2.5;
      const bassBonus = (bassPc != null && root === bassPc) ? 1.2 : 0;
      const score = missing * 1.6 + extra * 1.3 + rootPenalty - ivs.length * 0.12 - bassBonus;
      if (best === null || score < best.score) best = { rootPc: root, type: t, score };
    }
  }
  return best ? { rootPc: best.rootPc, type: best.type } : null;
}

// ── Key state ────────────────────────────────────────────────────────────────
let keyRootName = ROOTS[LIVE.rootIndex] || "C";
let keyMode = LIVE.mode || "Major";
function keyRootPc(){ return pcOf(keyRootName); }
function curPalette(){ return PALETTE[`${keyMode}|${keyRootName}`] || { diatonic: [], borrowed: [] }; }
function romanFor(rootPc, type){
  const d = ((rootPc - keyRootPc()) % 12 + 12) % 12;
  return DEG_ROMAN[d] + (TYPE_SUFFIX[type] ?? "");
}

// ── Analyze the clip into chord blocks ───────────────────────────────────────
const SLICE = 0.25;
let blocks = [];
function analyzeBlocks(){
  const start = CLIP.loopStart, end = CLIP.loopEnd;
  const notes = CLIP.notes.filter(n => n.startTime < end - EPS && n.startTime + n.duration > start + EPS);
  const n = Math.max(1, Math.round((end - start) / SLICE));
  const sets = [];
  for (let i = 0; i < n; i++){
    const t = start + (i + 0.5) * SLICE;
    const pcs = new Set();
    for (const nt of notes) if (nt.startTime <= t + EPS && nt.startTime + nt.duration > t - EPS) pcs.add(((nt.pitch % 12) + 12) % 12);
    sets.push(pcs.size ? [...pcs].sort((a,b)=>a-b) : null);
  }
  const out = [];
  let curPcs = null, curKey = null, curStart = 0;
  const keyOf = a => a ? a.join(",") : null;
  const push = (si, ei, pcs) => {
    const bs = start + si * SLICE, be = start + ei * SLICE;
    let minP = Infinity;
    for (const nt of notes) if (nt.startTime < be - EPS && nt.startTime + nt.duration > bs + EPS) minP = Math.min(minP, nt.pitch);
    const bass = minP === Infinity ? null : ((minP % 12) + 12) % 12;
    out.push({ start: bs, end: be, pcs, det: detectChord(pcs, bass) });
  };
  for (let i = 0; i < n; i++){
    const s = sets[i];
    if (s === null) continue;                 // rest → sustain current block
    const k = keyOf(s);
    if (curPcs === null){ curPcs = s; curKey = k; curStart = i; }
    else if (k !== curKey){ push(curStart, i, curPcs); curPcs = s; curKey = k; curStart = i; }
  }
  if (curPcs !== null) push(curStart, n, curPcs);
  blocks = out;
}

// ── Selection state ──────────────────────────────────────────────────────────
let selStart = null, selEnd = null;
function span(){ return CLIP.loopEnd - CLIP.loopStart; }
function pct(beat){ return ((beat - CLIP.loopStart) / span()) * 100; }
function beatAtX(clientX, el){
  const r = el.getBoundingClientRect();
  const f = Math.min(1, Math.max(0, (clientX - r.left) / r.width));
  return CLIP.loopStart + f * span();
}
function snap(beat){ return CLIP.loopStart + Math.round((beat - CLIP.loopStart) * 2) / 2; } // 1/2-beat grid

// ── Rewrite cards ────────────────────────────────────────────────────────────
let slots = [];
let selectedCard = null;
let VEL = 96, HUMANIZE = true, SMOOTH = false, LOOPPLAY = true;

// Every card is born with the default color (= its own sound) and Close voicing;
// recomputeSlot derives midi/name/hasSeventh from that state.
function makeSlot(opts){
  // Resolve the roman first — its accidental (if any) steers the spelling.
  const roman = opts.roman || romanFor(opts.rootPc, opts.type);
  const s = {
    rootPc: opts.rootPc, type: opts.type,
    rootName: opts.rootName || spellPc(opts.rootPc, roman),
    baseName: opts.name || nameOf(opts.rootPc, opts.type, roman),
    roman,
    weight: opts.weight || 1,
    origin: opts.origin || "tech",
    color: defaultColorKey(opts.type),
    voicing: "close",
    pinned: false,
  };
  recomputeSlot(s);
  return s;
}
function slotFromBlock(b){
  const d = b.det || { rootPc: 0, type: "maj" };
  return makeSlot({ rootPc: d.rootPc, type: d.type, weight: Math.max(0.25, b.end - b.start), origin: "orig" });
}
function slotFromChord(rootPc, type, roman, weight){
  return makeSlot({ rootPc, type, roman, weight });
}
function slotFromDiatonic(i, weight){
  const c = curPalette().diatonic[i];
  if (!c) return slotFromChord((keyRootPc() + [0,2,4,5,7,9,11][i]) % 12, "maj7", null, weight);
  return makeSlot({ rootPc: pcOf(c.rootName), type: c.type, name: c.name, roman: c.roman,
                    weight, rootName: c.rootName });
}
function seedSlots(){
  if (selStart === null){ slots = []; return; }
  const inside = blocks.filter(b => b.start >= selStart - EPS && b.end <= selEnd + EPS);
  slots = inside.length ? inside.map(slotFromBlock)
                        : [slotFromBlock({ start: selStart, end: selEnd, det: detectChord(pcsInSpan(selStart, selEnd), bassInSpan(selStart, selEnd)) })];
  selectedCard = null;
}
function pcsInSpan(a, b){
  const pcs = new Set();
  for (const n of CLIP.notes) if (n.startTime < b - EPS && n.startTime + n.duration > a + EPS) pcs.add(((n.pitch % 12) + 12) % 12);
  return [...pcs].sort((x,y)=>x-y);
}
function bassInSpan(a, b){
  let minP = Infinity;
  for (const n of CLIP.notes) if (n.startTime < b - EPS && n.startTime + n.duration > a + EPS) minP = Math.min(minP, n.pitch);
  return minP === Infinity ? null : ((minP % 12) + 12) % 12;
}

// ── Target / preceding chord relative to the selection (loop-aware) ──────────
function targetChord(){
  if (!blocks.length || selEnd === null) return null;
  const after = blocks.find(b => b.start >= selEnd - EPS);
  return (after || blocks[0]).det;       // wrap to top of the loop
}
function prevChord(){
  if (!blocks.length || selStart === null) return null;
  const before = [...blocks].reverse().find(b => b.end <= selStart + EPS);
  return (before || blocks[blocks.length - 1]).det;
}
function tgtName(){ const t = targetChord(); return t ? nameOf(t.rootPc, t.type) : null; }

// ── Pitch context helpers ────────────────────────────────────────────────────
function notesSoundingAt(t){
  const p = [];
  for (const n of CLIP.notes) if (n.startTime <= t + EPS && n.startTime + n.duration > t - EPS) p.push(n.pitch);
  return asc(p);
}
// Average pitch of the original material in the region — new chords are
// octave-shifted to live in the same register, so the rewrite sits IN the part
// instead of jumping to middle C.
function regionAnchor(){
  let sum = 0, count = 0;
  if (selStart !== null){
    for (const n of CLIP.notes) if (n.startTime < selEnd - EPS && n.startTime + n.duration > selStart + EPS){ sum += n.pitch; count++; }
  }
  if (!count) for (const n of CLIP.notes){ sum += n.pitch; count++; }
  return count ? sum / count : 60;
}
// Pitches sounding just before the selection (loop-aware) — seeds voice-leading.
function seedVoicePitches(){
  if (selStart === null) return null;
  let t = selStart - 0.01;
  if (t < CLIP.loopStart + EPS) t = CLIP.loopEnd - 0.01;
  const p = notesSoundingAt(t);
  return p.length >= 2 ? p : null;
}

// ── Auto voice-leading (optional) — ported from Chord Progression Builder ────
function voiceLeadCost(candidate, prev){
  let cost = 0;
  for (const n of candidate){
    let best = Infinity;
    for (const p of prev) best = Math.min(best, Math.abs(n - p));
    cost += best;
  }
  return cost;
}
function bestVoicingAgainst(prev, notes){
  let best = asc(notes), bestCost = Infinity;
  const base = asc(notes);
  for (let rot = 0; rot < base.length; rot++){
    const rotated = asc(base.map((v, i) => (i < rot ? v + 12 : v)));
    for (const shift of [-24, -12, 0, 12]){
      const cand = rotated.map(v => v + shift);
      if (Math.min.apply(null, cand) < 28 || Math.max.apply(null, cand) > 100) continue;
      const cost = voiceLeadCost(cand, prev) + 0.15 * Math.abs(avg(cand) - avg(prev));
      if (cost < bestCost - 1e-9) { bestCost = cost; best = cand; }
    }
  }
  return best;
}

// Final per-card note arrays: register-anchored, optionally voice-led.
// Works on any slot array so uncommitted chips can be auditioned too.
function anchoredNotesFor(list){
  if (!list.length) return [];
  const anchor = regionAnchor();
  let arrs = list.map(s => asc(s.midi));
  arrs = arrs.map(a => {
    const shift = Math.round((anchor - avg(a)) / 12) * 12;
    return a.map(n => Math.max(0, Math.min(127, n + shift)));
  });
  if (SMOOTH){
    const out = [];
    let prev = seedVoicePitches();
    for (const a of arrs){
      const v = prev ? bestVoicingAgainst(prev, a) : a;
      out.push(v); prev = v;
    }
    arrs = out;
  }
  return arrs;
}
function anchoredSlotNotes(){ return anchoredNotesFor(slots); }

// Beat spans of each card inside the selection (weights → proportional time).
function slotSpans(){
  if (selStart === null || !slots.length) return [];
  const L = selEnd - selStart, W = slots.reduce((s,x)=>s+x.weight,0) || 1;
  const out = []; let cum = 0;
  slots.forEach((s, i) => {
    const st = selStart + L * cum / W;
    cum += s.weight;
    out.push({ idx: i, start: st, end: selStart + L * cum / W });
  });
  return out;
}

// ── Rendering: region → notes (this exact list is what gets applied) ─────────
function renderRegionNotes(){
  if (selStart === null || !slots.length) return [];
  const arrs = anchoredSlotNotes();
  const spans = slotSpans();
  const out = [];
  spans.forEach((sp, i) => {
    const dur = Math.max(0.05, sp.end - sp.start - 0.02);
    for (const p of arrs[i]) out.push({ pitch: p, startTime: +sp.start.toFixed(5), duration: +dur.toFixed(5), velocity: VEL });
  });
  if (HUMANIZE){
    for (const n of out){
      n.velocity = Math.max(1, Math.min(127, Math.round(n.velocity + (Math.random() - 0.5) * 14)));
      if (n.startTime > selStart + EPS) n.startTime = +(n.startTime + Math.random() * 0.02).toFixed(5);
      n.duration = +Math.max(0.05, Math.min(n.duration, selEnd - n.startTime)).toFixed(5);
    }
  }
  return out;
}

// Original notes inside the loop, sliced at the selection boundaries — the
// SAME razor-edit the extension performs on apply. What you hear is what you get.
function slicedOriginals(){
  const out = [];
  for (const n of CLIP.notes){
    let s = n.startTime, e = n.startTime + n.duration;
    if (e <= CLIP.loopStart + EPS || s >= CLIP.loopEnd - EPS) continue;
    s = Math.max(s, CLIP.loopStart); e = Math.min(e, CLIP.loopEnd);
    const keep = (a, b) => out.push({ pitch: n.pitch, startTime: a, duration: b - a, velocity: n.velocity });
    if (selStart === null || e <= selStart + EPS || s >= selEnd - EPS){ keep(s, e); continue; }
    if (s < selStart - EPS) keep(s, selStart);
    if (e > selEnd + EPS) keep(selEnd, e);
  }
  return out;
}

// Full performance for the Listen loop: sliced originals + the rewrite.
function buildPerformance(){
  const base = CLIP.loopStart, len = span();
  const events = [];
  for (const n of slicedOriginals()) events.push({ pitch: n.pitch, startTime: n.startTime - base, duration: n.duration, velocity: n.velocity });
  for (const n of renderRegionNotes()) events.push({ pitch: n.pitch, startTime: n.startTime - base, duration: n.duration, velocity: n.velocity });
  for (const e of events) e.duration = Math.max(0.03, Math.min(e.duration, len - e.startTime));
  return { events, lengthBeats: len };
}

// ════════════════════════════════════════════════════════════════════════════
//  AUDIO ENGINE — same instruments as Chord Progression Builder
// ════════════════════════════════════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function midiToFreq(midi){ return 440 * Math.pow(2, (midi - 69) / 12); }
function instrument(){ return document.getElementById('soundSel').value; }

function makeGate(ctx, dest, at, dur){
  const gate = ctx.createGain();
  gate.gain.setValueAtTime(1, at);
  gate.gain.setValueAtTime(1, at + dur);
  gate.gain.linearRampToValueAtTime(0, at + dur + 0.08);
  gate.connect(dest);
  return gate;
}

function playNote_piano(ctx, dest, freq, vel, at, dur){
  const gate = makeGate(ctx, dest, at, dur);
  const master = ctx.createGain();
  master.connect(gate);
  master.gain.setValueAtTime(vel, at);
  master.gain.exponentialRampToValueAtTime(0.001, at + 2.5);
  const amps = [1, 0.5, 0.25, 0.13, 0.07, 0.035, 0.018];
  amps.forEach((amp, i) => {
    const n = i + 1;
    const f = freq * n * Math.sqrt(1 + 0.00015 * n * n);
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    const decay = 2.5 / (n * 0.45 + 0.55);
    g.gain.setValueAtTime(amp * 0.35, at);
    g.gain.exponentialRampToValueAtTime(0.001, at + decay);
    osc.connect(g); g.connect(master);
    osc.start(at); osc.stop(at + Math.min(decay, dur + 0.15) + 0.1);
  });
}

function playNote_ep(ctx, dest, freq, vel, at, dur){
  const gate = makeGate(ctx, dest, at, dur);
  const mod = ctx.createOscillator();
  const modGain = ctx.createGain();
  const car = ctx.createOscillator();
  const gain = ctx.createGain();
  mod.type = 'sine';
  mod.frequency.value = freq * 2;
  modGain.gain.setValueAtTime(freq * 2.8, at);
  modGain.gain.exponentialRampToValueAtTime(0.5, at + 1.0);
  mod.connect(modGain); modGain.connect(car.frequency);
  car.type = 'sine'; car.frequency.value = freq;
  car.connect(gain); gain.connect(gate);
  gain.gain.setValueAtTime(vel * 0.5, at);
  gain.gain.exponentialRampToValueAtTime(0.001, at + 2.2);
  mod.start(at); car.start(at);
  mod.stop(at + dur + 0.2); car.stop(at + dur + 0.2);
}

function playNote_synth(ctx, dest, freq, vel, at, dur){
  const gate = makeGate(ctx, dest, at, dur);
  const osc1 = ctx.createOscillator();
  const osc2 = ctx.createOscillator();
  const filter = ctx.createBiquadFilter();
  const gain = ctx.createGain();
  osc1.type = 'sawtooth'; osc1.frequency.value = freq;
  osc2.type = 'sawtooth'; osc2.frequency.value = freq * 1.006;
  filter.type = 'lowpass'; filter.Q.value = 3.5;
  filter.frequency.setValueAtTime(freq * 1.2, at);
  filter.frequency.exponentialRampToValueAtTime(freq * 7, at + 0.06);
  filter.frequency.exponentialRampToValueAtTime(freq * 2, at + 1.5);
  osc1.connect(filter); osc2.connect(filter);
  filter.connect(gain); gain.connect(gate);
  gain.gain.setValueAtTime(0, at);
  gain.gain.linearRampToValueAtTime(vel * 0.28, at + 0.018);
  gain.gain.setValueAtTime(vel * 0.28, at + Math.min(0.25, dur));
  gain.gain.exponentialRampToValueAtTime(0.001, at + Math.max(0.3, Math.min(1.8, dur + 0.2)));
  osc1.start(at); osc2.start(at);
  osc1.stop(at + dur + 0.25); osc2.stop(at + dur + 0.25);
}

function playOneNote(ctx, dest, inst, midi, gain, at, dur){
  const freq = midiToFreq(midi);
  if (inst === 'piano') playNote_piano(ctx, dest, freq, gain, at, dur);
  else if (inst === 'ep') playNote_ep(ctx, dest, freq, gain, at, dur);
  else if (inst === 'synth') playNote_synth(ctx, dest, freq, gain, at, dur);
}

// One-shot chord audition — used everywhere a chord is tapped.
function previewChord(midiNotes){
  const inst = instrument();
  if (inst === 'none' || !midiNotes || !midiNotes.length) return;
  const ctx = getAudioCtx();
  const gain = 0.7 / Math.sqrt(midiNotes.length);
  midiNotes.forEach(m => playOneNote(ctx, ctx.destination, inst, m, gain, ctx.currentTime, 1.1));
}

// ── Transport: full-loop playback + section audition ─────────────────────────
let playback = null; // { gain, timers: [] }

function clearPlaying(){
  document.querySelectorAll('.playing').forEach(el => el.classList.remove('playing'));
}
function setPlaying(){
  clearPlaying();
  for (const id of arguments){
    const el = document.getElementById(id);
    if (el) el.classList.add('playing');
  }
}
function startPlayline(fromBeat, toBeat, seconds){
  const pl = document.getElementById('playline');
  pl.style.display = 'block';
  pl.style.transition = 'none';
  pl.style.left = pct(fromBeat) + '%';
  void pl.offsetWidth; // reflow so the next transition restarts
  pl.style.transition = 'left ' + seconds + 's linear';
  pl.style.left = pct(toBeat) + '%';
}
function hidePlayline(){
  const pl = document.getElementById('playline');
  pl.style.transition = 'none';
  pl.style.display = 'none';
}
function stopPlayback(){
  if (!playback) return;
  for (const t of playback.timers) clearTimeout(t);
  const ctx = getAudioCtx();
  try {
    playback.gain.gain.cancelScheduledValues(ctx.currentTime);
    playback.gain.gain.setValueAtTime(playback.gain.gain.value, ctx.currentTime);
    playback.gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.08);
  } catch (e) {}
  playback = null;
  clearPlaying();
  hidePlayline();
  updatePlayBtn();
}
function updatePlayBtn(){
  const btn = document.getElementById('playBtn');
  btn.textContent = playback ? '■ Stop' : '▶ Listen';
  btn.classList.toggle('playing', !!playback);
}

// One pass of the whole loop; re-arms itself while Loop is on, picking up any
// edits made mid-flight — so you can keep sculpting while it cycles.
function schedulePass(){
  const perf = buildPerformance();
  if (!perf.events.length){ stopPlayback(); setStatus('Nothing to play.'); return; }
  const ctx = getAudioCtx();
  const spb = 60 / (LIVE.tempo || 120);
  const t0 = ctx.currentTime + 0.06;
  const dens = Math.max(3, Math.min(6, Math.round(perf.events.length / Math.max(1, perf.lengthBeats))));
  for (const ev of perf.events){
    const g = (0.7 / Math.sqrt(dens)) * (ev.velocity / 110);
    playOneNote(ctx, playback.gain, instrument(), ev.pitch, g, t0 + ev.startTime * spb, ev.duration * spb);
  }
  startPlayline(CLIP.loopStart, CLIP.loopEnd, perf.lengthBeats * spb);
  // Light each chord as it sounds: original blocks outside the selection,
  // rewrite cards (and their ghosts) inside it.
  const cues = [];
  blocks.forEach((b, i) => {
    if (selStart !== null && b.start >= selStart - EPS && b.end <= selEnd + EPS) return;
    cues.push({ t: b.start - CLIP.loopStart, ids: ['blk-' + i] });
  });
  slotSpans().forEach(sp => cues.push({ t: sp.start - CLIP.loopStart, ids: ['card-' + sp.idx, 'ghost-' + sp.idx] }));
  cues.sort((a, b) => a.t - b.t);
  for (const c of cues){
    playback.timers.push(setTimeout(() => { if (playback) setPlaying.apply(null, c.ids); }, 60 + c.t * spb * 1000));
  }
  playback.timers.push(setTimeout(() => {
    if (!playback) return;
    if (LOOPPLAY) schedulePass();
    else stopPlayback();
  }, perf.lengthBeats * spb * 1000 + 80));
}

function playWhole(){
  if (playback){ stopPlayback(); return; }
  if (instrument() === 'none'){ setStatus('Preview is muted — pick a Sound up top.'); return; }
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.gain.value = 1;
  g.connect(ctx.destination);
  playback = { gain: g, timers: [] };
  schedulePass();
  updatePlayBtn();
}

// Just the rewrite + one beat of its resolution — the quickest reality check.
function playSection(){
  if (selStart === null){ setStatus('Select a section first — tap a chord up top.'); return; }
  if (instrument() === 'none'){ setStatus('Preview is muted — pick a Sound up top.'); return; }
  stopPlayback();
  const ev = renderRegionNotes().map(n => ({ pitch: n.pitch, startTime: n.startTime - selStart, duration: n.duration, velocity: n.velocity }));
  let len = selEnd - selStart;
  const t = targetChord();
  if (t){
    const res = voicing(t.rootPc, t.type);
    const shift = Math.round((regionAnchor() - avg(res)) / 12) * 12;
    for (const p of res) ev.push({ pitch: p + shift, startTime: len, duration: 1.2, velocity: Math.max(30, VEL - 22) });
    len += 1.2;
  }
  if (!ev.length){ setStatus('The section is empty — applying will clear these beats.'); return; }
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.gain.value = 1;
  g.connect(ctx.destination);
  playback = { gain: g, timers: [] };
  const spb = 60 / (LIVE.tempo || 120);
  const t0 = ctx.currentTime + 0.06;
  for (const e of ev) playOneNote(ctx, g, instrument(), e.pitch, (0.7 / Math.sqrt(3)) * (e.velocity / 110), t0 + e.startTime * spb, e.duration * spb);
  startPlayline(selStart, Math.min(CLIP.loopEnd, selStart + len), len * spb);
  slotSpans().forEach(sp => playback.timers.push(setTimeout(() => {
    if (playback) setPlaying('card-' + sp.idx, 'ghost-' + sp.idx);
  }, 60 + (sp.start - selStart) * spb * 1000)));
  playback.timers.push(setTimeout(() => { if (playback) stopPlayback(); }, len * spb * 1000 + 150));
  updatePlayBtn();
}

// ════════════════════════════════════════════════════════════════════════════
//  RENDERING
// ════════════════════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function setStatus(msg){ $("status").textContent = msg || ""; }

function barBeat(t){
  const rel = t - CLIP.loopStart;
  const bar = Math.floor(rel / BEATS_PER_BAR) + 1;
  const beat = rel - (bar - 1) * BEATS_PER_BAR + 1;
  return "bar " + bar + (Math.abs(beat - 1) > EPS ? " · beat " + fmt(beat) : "");
}

function voiceStripHtml(midiNotes){
  if (!midiNotes || !midiNotes.length) return "";
  const lo = Math.min.apply(null, midiNotes), hi = Math.max.apply(null, midiNotes);
  const range = Math.max(1, hi - lo);
  return midiNotes.map(n => {
    const h = 35 + 65 * ((n - lo) / range);
    return '<span style="height:' + h + '%"></span>';
  }).join('');
}

function renderTimeline(){
  const ruler = $("ruler"); ruler.innerHTML = "";
  const totalBeats = span();
  for (let beat = 0; beat <= totalBeats + EPS; beat++){
    const isBar = beat % BEATS_PER_BAR === 0;
    const t = CLIP.loopStart + beat;
    const d = document.createElement("div");
    d.className = isBar ? "bar" : "beat";
    d.style.left = pct(t) + "%";
    if (isBar) d.textContent = (beat / BEATS_PER_BAR + 1);
    ruler.appendChild(d);
  }
  const track = $("track");
  [...track.querySelectorAll(".blk")].forEach(e => e.remove());
  blocks.forEach((b, i) => {
    const d = b.det || { rootPc: 0, type: "maj" };
    const el = document.createElement("div");
    el.className = "blk";
    el.id = "blk-" + i;
    el.style.left = pct(b.start) + "%";
    el.style.width = (pct(b.end) - pct(b.start)) + "%";
    el.style.setProperty("--h", hueOf(d.rootPc));
    el.dataset.i = i;
    el.innerHTML = `<span class="nm">${nameOf(d.rootPc, d.type)}</span><span class="rm">${romanFor(d.rootPc, d.type)}</span>`;
    track.appendChild(el);
  });
  paintSelection();
}

function renderGhost(){
  const row = $("ghostRow");
  row.innerHTML = "";
  if (selStart === null) return;
  if (!slots.length){
    const d = document.createElement("div");
    d.className = "ghost-empty";
    d.textContent = "silence";
    row.appendChild(d);
    return;
  }
  slots.forEach((s, i) => {
    const d = document.createElement("div");
    d.className = "ghost" + (s.origin === "orig" ? " orig-ghost" : "");
    d.id = "ghost-" + i;
    d.style.flexGrow = s.weight;
    d.style.setProperty("--h", hueOf(s.rootPc));
    d.textContent = s.name;
    row.appendChild(d);
  });
}

function paintSelection(){
  const ov = $("selOverlay");
  if (selStart === null){ ov.style.display = "none"; }
  else {
    ov.style.display = "block";
    ov.style.left = pct(selStart) + "%";
    ov.style.width = (pct(selEnd) - pct(selStart)) + "%";
  }
  $("selClearBtn").classList.toggle("hidden", selStart === null);
  [...document.querySelectorAll(".blk")].forEach(el => {
    const b = blocks[+el.dataset.i];
    const inSel = selStart !== null && b.start >= selStart - EPS && b.end <= selEnd + EPS;
    el.classList.toggle("muted", inSel);
  });
  $("selInfo").textContent = selStart === null ? "no selection"
    : "rewriting " + fmt(selEnd - selStart) + " beats · from " + barBeat(selStart);
  const t = tgtName();
  $("regSpan").textContent = selStart === null ? "select a moment up top to begin"
    : fmt(selEnd - selStart) + " beats" + (t ? " · resolves into " + t : "");
  renderGhost();
}

function renderCards(){
  confirmEmptyApply = false;   // any edit/selection change disarms pending confirms
  confirmDiscard = false;
  const host = $("cards");
  host.innerHTML = "";
  if (selStart === null){
    host.innerHTML = `<div class="cards-empty">Pick a moment in the strip above — then sketch its replacement here.</div>`;
  } else if (!slots.length){
    host.innerHTML = `<div class="cards-empty">Blank slate — add chords from the right, hit 🎲 Reimagine, or ↺ to start from the originals. Applying while empty clears these beats.</div>`;
  } else {
    const spans = slotSpans();
    slots.forEach((s, i) => {
      const el = document.createElement("div");
      el.className = "card" + (s.origin === "orig" ? " orig-card" : "") + (i === selectedCard ? " selected" : "") + (s.pinned ? " pinned" : "");
      el.id = "card-" + i;
      el.dataset.idx = i;
      el.draggable = true;
      el.style.setProperty("--h", hueOf(s.rootPc));
      el.title = s.origin === "orig" ? "From your original clip — click to edit, drag to reorder"
                                     : "Click to edit, drag to reorder";
      el.innerHTML =
        `<span class="pin" data-pin="${i}" title="${s.pinned ? "Pinned — the dice can't touch it. Click to unpin" : "Pin this chord so 🎲 keeps it and rerolls the rest"}">📌</span>` +
        `<span class="x" data-rm="${i}" title="Remove this chord">✕</span>` +
        `<div class="c-name">${s.name}</div>` +
        `<div class="c-roman">${s.roman}</div>` +
        `<div class="voice-strip">${voiceStripHtml(s.midi)}</div>` +
        `<span class="beats-tag">${fmt(spans[i].end - spans[i].start)}b</span>`;
      host.appendChild(el);
    });
  }
  renderInspector();
  updateApply();
}

function renderInspector(){
  const insp = $("inspector");
  if (selectedCard === null || !slots[selectedCard]){
    selectedCard = null;
    insp.classList.add("hidden");
    return;
  }
  insp.classList.remove("hidden");
  const s = slots[selectedCard];
  $("inspTitle").textContent = s.name + "  ·  " + s.roman;
  const spans = slotSpans();
  $("inspBeats").textContent = fmt(spans[selectedCard].end - spans[selectedCard].start) + " beats";
  // Color chips — extensions / sus / altered tensions for this chord type.
  $("colorRow").innerHTML = '<span class="ctl-label">Color</span>' +
    colorDefs(s.type).map(d =>
      `<button class="vbtn${s.color === d.key ? ' active' : ''}" data-color="${d.key}" title="Recolor this chord">${d.label}</button>`
    ).join('');
  // Voicing chips — Rootless/Shell need a 7th, Drop-3 needs 4+ notes.
  $("voiceRow").innerHTML = '<span class="ctl-label">Voicing</span>' +
    VOICING_DEFS.map(v => {
      const dis = (v.needs7 && !s.hasSeventh) || (v.min4 && s.noteCount < 4);
      return `<button class="vbtn${s.voicing === v.key ? ' active' : ''}"${dis ? ' disabled' : ''} data-voicing="${v.key}" title="Re-voice this chord">${v.label}</button>`;
    }).join('');
}

function setCardColor(key){
  const s = slots[selectedCard];
  if (!s) return;
  s.color = key;
  recomputeSlot(s);
  // If the new color removed the 7th (or a voice), fall back from voicings
  // that no longer apply, then recompute with the corrected voicing.
  if ((!s.hasSeventh && (s.voicing === 'rootless' || s.voicing === 'shell')) ||
      (s.noteCount < 4 && s.voicing === 'drop3')){
    s.voicing = 'close';
    recomputeSlot(s);
  }
  renderCards(); paintSelection();
  previewCard(selectedCard);
}

function setCardVoicing(key){
  const s = slots[selectedCard];
  if (!s) return;
  const def = VOICING_DEFS.find(v => v.key === key);
  if (def && ((def.needs7 && !s.hasSeventh) || (def.min4 && s.noteCount < 4))) return;
  s.voicing = key;
  recomputeSlot(s);
  renderCards(); paintSelection();
  previewCard(selectedCard);
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
let activeTab = "turn";
function tabTip(){
  const t = tgtName();
  if (selStart === null) return "Select a section first — everything here drops straight into it.";
  switch (activeTab){
    case "turn":     return "Classic cadences that pull back " + (t ? "to " + t : "home") + ". Click to hear one — double-click or + fills the section with it.";
    case "approach": return "Slide in from a half-step away" + (t ? " — next chord is " + t : "") + ". Click to hear it; double-click or + tacks it onto the end.";
    case "pass":     return "Bridge chords that connect what came before to what comes next" + (t ? " (" + t + ")" : "") + ". Click to hear, double-click or + to add.";
    default:         return "The full palette in " + keyNames()[keyRootPc()] + " " + keyMode + ". ★ = pulls toward the next chord. Click to hear, double-click or + to add.";
  }
}

// Chips audition on click and only commit on double-click or the + button —
// so you can shop around by ear without cleaning up the rewrite afterwards.
function chipRow(items){
  const wrap = document.createElement("div"); wrap.className = "chips";
  items.forEach(it => {
    const c = document.createElement("div");
    c.className = "chip" + (it.sug ? " sug" : "");
    c.style.setProperty("--h", it.hue != null ? it.hue : 285);
    c.innerHTML = `<b>${it.label}</b>${it.sub ? `<small>${it.sub}</small>` : ""}`;
    c.title = (it.title ? it.title + ". " : "") + "Click to hear it — double-click or + to add it to the rewrite";
    const add = document.createElement("span");
    add.className = "chip-add";
    add.textContent = "+";
    add.title = "Add to the rewrite";
    add.onclick = e => { e.stopPropagation(); commitChip(it, false); };
    add.ondblclick = e => e.stopPropagation();
    c.appendChild(add);
    c.onclick = () => { armChip(c); previewSlots(it.make()); };
    c.ondblclick = () => commitChip(it, true); // quiet — both clicks already played it
    wrap.appendChild(c);
  });
  return wrap;
}
function armChip(c){
  document.querySelectorAll("#tabBody .chip.armed").forEach(x => x.classList.remove("armed"));
  c.classList.add("armed");
}
function commitChip(it, quiet){
  const made = it.make();
  if (it.mode === "replace") replaceAll(made);
  else appendSlot(made[0], quiet);
}

// Turnarounds — diatonic-degree templates resolving to the top of the loop.
const TURNS = [
  { label: "ii – V",              sub: "the classic pull home",  deg: [1, 4] },
  { label: "I – vi – ii – V",     sub: "doo-wop turnaround",     deg: [0, 5, 1, 4] },
  { label: "iii – vi – ii – V",   sub: "longer runway",          deg: [2, 5, 1, 4] },
  { label: "I – VI7 – ii – V7",   sub: "gospel heat",            build: () => [slotFromDiatonic(0), slotFromChord((keyRootPc()+9)%12,"7","V7/ii"), slotFromDiatonic(1), slotFromDiatonic(4)] },
  { label: "ii – ♭II7",           sub: "tritone sub",            build: () => [slotFromDiatonic(1), slotFromChord((keyRootPc()+1)%12,"7","♭II7")] },
  { label: "I – ♭iii°7 – ii – V", sub: "sneaky chromatic slide", build: () => [slotFromDiatonic(0), slotFromChord((keyRootPc()+3)%12,"dim7","♭iii°7"), slotFromDiatonic(1), slotFromDiatonic(4)] },
];
function renderTurn(body){
  body.appendChild(chipRow(TURNS.map(t => ({
    label: t.label, sub: t.sub, mode: "replace",
    make: () => t.build ? t.build() : t.deg.map(d => slotFromDiatonic(d))
  }))));
}

function renderApproach(body){
  const t = targetChord();
  if (!t){ body.innerHTML = `<div class="cards-empty">No following chord to approach.</div>`; return; }
  const r = t.rootPc;
  const items = [
    { rootPc: (r+1)%12,  type: "7",    roman: "♭II7→",  sub: "tritone slide from above" },
    { rootPc: (r+11)%12, type: "7",    roman: "♭VII7→", sub: "half-step push from below" },
    { rootPc: (r+7)%12,  type: "7",    roman: "V7/x",   sub: "its own dominant" },
    { rootPc: (r+11)%12, type: "dim7", roman: "vii°7→", sub: "leading-tone tension" },
    { rootPc: (r+1)%12,  type: t.type, roman: "",       sub: "parallel ½-step above" },
  ];
  body.appendChild(chipRow(items.map(i => ({
    label: nameOf(i.rootPc, i.type, i.roman), sub: i.sub, hue: hueOf(i.rootPc), mode: "append",
    make: () => [slotFromChord(i.rootPc, i.type, i.roman || undefined, 0.5)]
  }))));
}

function renderPass(body){
  const t = targetChord(), p = prevChord();
  if (!t){ body.innerHTML = `<div class="cards-empty">No following chord to pass into.</div>`; return; }
  const tr = t.rootPc, pr = p ? p.rootPc : (tr+10)%12;
  const items = [
    { rootPc: (pr+1)%12, type: "dim7", roman: "♯i°7",   sub: "chromatic passing °7" },
    { rootPc: (tr+7)%12, type: "7",    roman: "V7/x",   sub: "dominant of the next chord" },
    { rootPc: (tr+1)%12, type: "7",    roman: "♭II7",   sub: "tritone sub of the next" },
    { rootPc: (tr+2)%12, type: "m7",   roman: "iim7/x", sub: "sets up a ii–V into it" },
  ];
  body.appendChild(chipRow(items.map(i => ({
    label: nameOf(i.rootPc, i.type, i.roman), sub: i.sub, hue: hueOf(i.rootPc), mode: "append",
    make: () => [slotFromChord(i.rootPc, i.type, i.roman, 0.5)]
  }))));
}

function renderPalette(body){
  const pal = curPalette();
  const t = targetChord();
  const isSug = c => !!t && pcOf(c.rootName) === (t.rootPc + 7) % 12; // a fifth above next = V→next pull
  const mk = c => ({
    label: c.name, sub: c.roman, hue: hueOf(pcOf(c.rootName)), sug: isSug(c), mode: "append",
    title: isSug(c) ? "Pulls toward " + tgtName() : "",
    make: () => [makeSlot({ rootPc: pcOf(c.rootName), type: c.type, name: c.name, roman: c.roman, rootName: c.rootName })]
  });
  const h1 = document.createElement("div"); h1.className = "pal-label"; h1.textContent = "Diatonic — at home in the key";
  body.appendChild(h1);
  body.appendChild(chipRow(pal.diatonic.map(mk)));
  const gap = document.createElement("div"); gap.className = "pal-gap"; body.appendChild(gap);
  const h2 = document.createElement("div"); h2.className = "pal-label"; h2.textContent = "Borrowed — the spice rack";
  body.appendChild(h2);
  body.appendChild(chipRow(pal.borrowed.map(mk)));
}

function renderTab(){
  $("tabTip").textContent = tabTip();
  const body = $("tabBody"); body.innerHTML = "";
  if (selStart === null){ body.innerHTML = `<div class="cards-empty">Waiting on a selection…</div>`; return; }
  if (activeTab === "turn") renderTurn(body);
  else if (activeTab === "approach") renderApproach(body);
  else if (activeTab === "pass") renderPass(body);
  else renderPalette(body);
}

function renderAll(){ renderTimeline(); renderCards(); renderTab(); }

// ── Card / slot actions (every change makes a sound) ─────────────────────────
function previewCard(i){
  const arrs = anchoredSlotNotes();
  if (arrs[i]) previewChord(arrs[i]);
}
// Audition candidate slots WITHOUT committing them to the rewrite.
// One chord → one-shot strike; a sequence → played in time over the selection.
function previewSlots(arr){
  if (!arr || !arr.length) return;
  if (instrument() === 'none'){ setStatus('Preview is muted — pick a Sound up top.'); return; }
  const notes = anchoredNotesFor(arr);
  if (arr.length === 1){ previewChord(notes[0]); return; }
  stopPlayback();
  const W = arr.reduce((s, x) => s + x.weight, 0) || 1;
  const L = selStart !== null ? selEnd - selStart : W;
  const ctx = getAudioCtx();
  const g = ctx.createGain();
  g.gain.value = 1;
  g.connect(ctx.destination);
  playback = { gain: g, timers: [] };
  const spb = 60 / (LIVE.tempo || 120);
  const t0 = ctx.currentTime + 0.06;
  let cum = 0;
  arr.forEach((s, i) => {
    const st = L * cum / W;
    cum += s.weight;
    const dur = Math.max(0.05, L * cum / W - st - 0.02);
    const gn = 0.7 / Math.sqrt(Math.max(3, notes[i].length));
    for (const p of notes[i]) playOneNote(ctx, g, instrument(), p, gn, t0 + st * spb, dur * spb);
  });
  playback.timers.push(setTimeout(() => { if (playback) stopPlayback(); }, L * spb * 1000 + 600));
  updatePlayBtn();
}
function appendSlot(s, quiet){
  if (selStart === null) return;
  slots.push(s);
  selectedCard = slots.length - 1;
  renderCards(); paintSelection();
  if (!quiet) previewCard(slots.length - 1);
}
function replaceAll(arr){
  if (selStart === null) return;
  slots = arr;
  selectedCard = null;
  renderCards(); paintSelection();
  playSection();
}
function removeCard(i){
  slots.splice(i, 1);
  if (selectedCard !== null){
    if (selectedCard === i) selectedCard = null;
    else if (selectedCard > i) selectedCard--;
  }
  renderCards(); paintSelection();
}
function moveCard(from, to){
  if (to < 0 || to >= slots.length) return;
  const [s] = slots.splice(from, 1);
  slots.splice(to, 0, s);
  selectedCard = to;
  renderCards(); paintSelection();
}
function selectCard(i){
  selectedCard = i;
  renderCards();
  previewCard(i);
}

// ── 🎲 Reimagine — roll a progression that resolves into what comes next ─────
// The dice chain BACKWARD from the chord after the selection (loop-aware): each
// rolled chord is chosen for how it pulls into the one that follows it, so every
// roll lands somewhere on purpose. The vibe picks the move pool; 📌 pinned cards
// survive the roll and rerolled cards keep their timing.
const pick = a => a[Math.floor(Math.random() * a.length)];
function weightedPick(weights){
  let r = Math.random() * Object.values(weights).reduce((a, b) => a + b, 0);
  for (const k in weights){ r -= weights[k]; if (r <= 0) return k; }
  return Object.keys(weights)[0];
}
const DICE_MOVES = {
  subtle:  { diatonic: 0.60, dominant: 0.22, ii: 0.18 },                  // never leaves the key
  classic: { diatonic: 0.32, dominant: 0.26, ii: 0.18, dim: 0.12, tritone: 0.12 },
  spicy:   { diatonic: 0.10, dominant: 0.14, ii: 0.08, dim: 0.15, tritone: 0.18, borrowed: 0.25, chroma: 0.10 },
};
function diatonicAt(pc){
  pc = ((pc % 12) + 12) % 12;
  return (curPalette().diatonic || []).find(c => pcOf(c.rootName) === pc) || null;
}
function slotFromPalEntry(c){
  return makeSlot({ rootPc: pcOf(c.rootName), type: c.type, name: c.name, roman: c.roman, rootName: c.rootName });
}
// One backward step: a chord that wants to move into `f` ({rootPc, type}).
function genStep(f, vibe){
  const pal = curPalette();
  const moves = { ...DICE_MOVES[vibe] };
  if (!(pal.borrowed || []).length) delete moves.borrowed;
  for (let tries = 0; tries < 8; tries++){
    const m = weightedPick(moves);
    let s = null;
    if (m === "dominant"){
      const d = diatonicAt(f.rootPc + 7);
      s = vibe === "subtle" ? (d && slotFromPalEntry(d)) : slotFromChord((f.rootPc + 7) % 12, "7", "V7/x");
    } else if (m === "ii"){
      const d = diatonicAt(f.rootPc + 2);
      s = vibe === "subtle" ? (d && slotFromPalEntry(d)) : slotFromChord((f.rootPc + 2) % 12, "m7", "ii/x");
    } else if (m === "tritone"){
      s = slotFromChord((f.rootPc + 1) % 12, "7", "♭II7");
    } else if (m === "dim"){
      s = slotFromChord((f.rootPc + 11) % 12, "dim7", "vii°7→");
    } else if (m === "chroma"){
      s = slotFromChord((f.rootPc + 1) % 12, CHORD_INTERVALS[f.type] ? f.type : "maj");
    } else if (m === "borrowed"){
      s = slotFromPalEntry(pick(pal.borrowed));
    } else {  // diatonic — half the time take the circle-of-fifths pull into f
      const d = pal.diatonic || [];
      if (!d.length) s = slotFromDiatonic(Math.floor(Math.random() * 7));
      else {
        const pull = diatonicAt(f.rootPc + 7);
        s = slotFromPalEntry(pull && Math.random() < 0.5 ? pull : pick(d));
      }
    }
    if (s && !(s.rootPc === ((f.rootPc % 12) + 12) % 12 && s.type === f.type)) return s;
  }
  return slotFromDiatonic(Math.floor(Math.random() * 7));   // pool exhausted — stay in key
}
// "auto" ≈ one chord per half-bar, capped at 6.
function autoCount(){ return Math.min(6, Math.max(1, Math.round((selEnd - selStart) / 2))); }

function reimagine(){
  if (selStart === null){ setStatus("Select a section first — tap a chord up top."); return; }
  const vibe = $("diceVibe").value;
  const tgt = targetChord() || { rootPc: keyRootPc(), type: /minor/i.test(keyMode) ? "m" : "maj" };
  const nPinned = slots.filter(s => s.pinned).length;
  if (nPinned && nPinned < slots.length){
    // Reroll around the pins: same chord count, same rhythm — only the
    // unpinned cards change, each rolled against whatever now follows it.
    let next = tgt;
    for (let i = slots.length - 1; i >= 0; i--){
      if (!slots[i].pinned){
        const g = genStep(next, vibe);
        g.weight = slots[i].weight;
        slots[i] = g;
      }
      next = slots[i];
    }
    setStatus(`🎲 Rerolled around ${nPinned} pinned chord${nPinned > 1 ? "s" : ""} — roll again or unpin.`);
  } else if (nPinned){
    setStatus("Everything is pinned — unpin a card to let the dice touch it.");
    return;
  } else {
    const cv = $("diceCount").value;
    const n = cv === "auto" ? autoCount() : +cv;
    // On auto + a tame vibe, sometimes reach for a classic turnaround shape.
    if (cv === "auto" && vibe !== "spicy" && n >= 2 && Math.random() < 0.4){
      const t = pick(vibe === "subtle" ? TURNS.filter(x => x.deg) : TURNS);
      slots = t.build ? t.build() : t.deg.map(d => slotFromDiatonic(d));
    } else {
      const out = [];
      let next = tgt;
      for (let i = 0; i < n; i++){ const g = genStep(next, vibe); out.unshift(g); next = g; }
      slots = out;
    }
    setStatus(`🎲 ${slots.length} chord${slots.length > 1 ? "s" : ""}, ${vibe} — listen, 📌 pin keepers, roll again.`);
  }
  selectedCard = null;
  renderCards(); paintSelection();
  playSection();
}

// ── Selection interaction ────────────────────────────────────────────────────
const timeArea = $("timeArea");
function clampBeat(b){ return Math.min(CLIP.loopEnd, Math.max(CLIP.loopStart, b)); }

// A NEW selection (fresh drag / chord click) starts the rewrite as a blank
// slate — you're here to replace these chords, not keep them. Edge nudges and
// moves keep whatever you've built; ↺ brings the originals back on demand.
function finalizeSelection(fresh){
  $("selOverlay").classList.remove("dragging");
  if (selStart !== null && selEnd - selStart < 0.05){ selStart = selEnd = null; }
  if (selStart === null || fresh){ slots = []; selectedCard = null; }
  paintSelection(); renderCards(); renderTab();
}

// One pointer state-machine drives all selection. Blocks are pointer-events:none,
// so a chord can never steal a drag — clicks are hit-tested by beat instead.
let it = null;
const pointerBeat = e => beatAtX(e.clientX, timeArea);

// A block's notes are only guaranteed to sound at its first slice MIDPOINT —
// that's where analyzeBlocks sampled them. Humanized onsets can start a hair
// after blk.start, which made the first chord (nothing sustaining in from
// earlier) audition as silence.
function blockAuditionPitches(blk){ return notesSoundingAt(blk.start + SLICE * 0.5); }

// Shift-click inside the target area auditions the staged rewrite chord under
// the cursor — the same anchored / voice-led pitches the loop plays.
let slotFlashTimer = null;
function previewSlotAt(beat){
  const sp = slotSpans().find(s => beat >= s.start - EPS && beat <= s.end + EPS);
  if (!sp) return;
  const arr = anchoredSlotNotes()[sp.idx];
  if (!arr || !arr.length) return;
  previewChord(arr);
  if (!playback){
    setPlaying("card-" + sp.idx, "ghost-" + sp.idx);
    clearTimeout(slotFlashTimer);
    slotFlashTimer = setTimeout(() => { if (!playback) clearPlaying(); }, 700);
  }
}

timeArea.addEventListener("pointerdown", e => {
  if (e.target.closest("#selOverlay")) return;       // handles/body run their own
  const raw = pointerBeat(e);
  it = { mode: "create", anchor: snap(raw), anchorRaw: raw, downX: e.clientX, shift: e.shiftKey, moved: false };
  e.preventDefault();
});
function onHandleDown(e, mode){
  e.stopPropagation(); e.preventDefault();
  if (mode === "move" && e.shiftKey){ previewSlotAt(pointerBeat(e)); return; }
  it = { mode, downX: e.clientX, moved: false, origStart: selStart, origEnd: selEnd, anchor: snap(pointerBeat(e)) };
}
$("selOverlay").querySelector(".handle.left").addEventListener("pointerdown", e => onHandleDown(e, "resizeL"));
$("selOverlay").querySelector(".handle.right").addEventListener("pointerdown", e => onHandleDown(e, "resizeR"));
$("selOverlay").querySelector(".body").addEventListener("pointerdown", e => onHandleDown(e, "move"));

window.addEventListener("pointermove", e => {
  if (!it) return;
  if (Math.abs(e.clientX - it.downX) > 3) it.moved = true;
  const b = snap(pointerBeat(e));
  if (it.mode === "create"){
    if (!it.moved) return;
    $("selOverlay").classList.add("dragging");
    selStart = clampBeat(Math.min(it.anchor, b));
    selEnd = clampBeat(Math.max(it.anchor, b));
  } else if (it.mode === "resizeL"){
    selStart = clampBeat(Math.min(b, selEnd - 0.5));
  } else if (it.mode === "resizeR"){
    selEnd = clampBeat(Math.max(b, selStart + 0.5));
  } else if (it.mode === "move"){
    let d = b - it.anchor, ns = it.origStart + d, ne = it.origEnd + d;
    if (ns < CLIP.loopStart){ ne += CLIP.loopStart - ns; ns = CLIP.loopStart; }
    if (ne > CLIP.loopEnd){ ns -= ne - CLIP.loopEnd; ne = CLIP.loopEnd; }
    selStart = ns; selEnd = ne;
  }
  paintSelection();
});

window.addEventListener("pointerup", () => {
  if (!it) return;
  const cur = it; it = null;
  if (cur.mode === "create" && !cur.moved){
    // a click, not a drag → select the chord under the cursor
    const beat = cur.anchorRaw;
    const blk = blocks.find(b => beat >= b.start - EPS && beat <= b.end + EPS);
    if (blk){
      if (cur.shift){
        // shift-click = audition only — the selection is left exactly as it was,
        // whether that's an existing target area or none at all
        previewChord(blockAuditionPitches(blk));
        return;
      }
      selStart = blk.start; selEnd = blk.end;
      finalizeSelection(true);
      // Audition the chord you just grabbed — its real notes, as recorded.
      previewChord(blockAuditionPitches(blk));
      setStatus("Got it — now reimagine it from the right, or 🎲.");
    }
    return;                                  // empty-space click: leave selection alone
  }
  finalizeSelection(cur.mode === "create");  // drag-create starts blank; resize/move keep your work
});

$("selClearBtn").onclick = () => { selStart = selEnd = null; finalizeSelection(false); };

// ── Wiring ───────────────────────────────────────────────────────────────────
// Each root option is spelled the way its own key prefers in the current mode
// (D♭ major but C♯ minor), so the dropdown always matches the palette.
function rootLabel(i){
  const p = PALETTE[`${keyMode}|${ROOTS[i]}`];
  return (p && p.noteNames ? p.noteNames : NOTE_FLAT)[i];
}
function buildKeySelectors(){
  const r = $("keyRoot"); r.innerHTML = "";
  ROOTS.forEach((n, i) => { const o = document.createElement("option"); o.value = n; o.textContent = rootLabel(i); r.appendChild(o); });
  r.value = keyRootName;
  const m = $("keyMode"); m.innerHTML = "";
  MODES.forEach(md => { const o = document.createElement("option"); o.value = md; o.textContent = md; m.appendChild(o); });
  m.value = keyMode;
  // Changing key re-labels romans + palette but never throws away your cards.
  r.onchange = () => { keyRootName = r.value; renderAll(); };
  m.onchange = () => {
    keyMode = m.value;
    [...r.options].forEach((o, i) => { o.textContent = rootLabel(i); });
    renderAll();
  };
}

$("cards").addEventListener("click", e => {
  const pin = e.target.closest("[data-pin]");
  if (pin){
    e.stopPropagation();
    const s = slots[+pin.dataset.pin];
    if (s){ s.pinned = !s.pinned; renderCards(); }
    return;
  }
  const rm = e.target.closest("[data-rm]");
  if (rm){ e.stopPropagation(); removeCard(+rm.dataset.rm); return; }
  const card = e.target.closest(".card");
  if (card) selectCard(+card.dataset.idx);
});
// Drag-to-reorder, same feel as Chord Progression Builder.
let dragFrom = null;
$("cards").addEventListener("dragstart", e => {
  const el = e.target.closest(".card");
  if (!el) return;
  dragFrom = +el.dataset.idx;
  e.dataTransfer.effectAllowed = "move";
});
$("cards").addEventListener("dragover", e => {
  const el = e.target.closest(".card");
  if (!el || dragFrom === null) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = "move";
  el.classList.add("dragover");
});
$("cards").addEventListener("dragleave", e => {
  const el = e.target.closest(".card");
  if (el) el.classList.remove("dragover");
});
$("cards").addEventListener("drop", e => {
  const el = e.target.closest(".card");
  if (!el || dragFrom === null) return;
  e.preventDefault();
  moveCard(dragFrom, +el.dataset.idx);
  dragFrom = null;
});
$("cards").addEventListener("dragend", () => { dragFrom = null; });

// Inspector — plain-words editing of the selected card.
// Color / voicing chips are re-rendered per card, so handle them by delegation.
$("inspector").addEventListener("click", e => {
  const btn = e.target.closest(".vbtn");
  if (!btn || btn.disabled) return;
  if (btn.dataset.color) setCardColor(btn.dataset.color);
  else if (btn.dataset.voicing) setCardVoicing(btn.dataset.voicing);
});
$("lenHalf").onclick = () => { const s = slots[selectedCard]; if (!s) return; s.weight = Math.max(0.25, s.weight * 0.5); renderCards(); paintSelection(); };
$("lenDouble").onclick = () => { const s = slots[selectedCard]; if (!s) return; s.weight = Math.min(8, s.weight * 2); renderCards(); paintSelection(); };
$("mvL").onclick = () => { if (selectedCard !== null) moveCard(selectedCard, selectedCard - 1); };
$("mvR").onclick = () => { if (selectedCard !== null) moveCard(selectedCard, selectedCard + 1); };
$("dupBtn").onclick = () => {
  const s = slots[selectedCard]; if (!s) return;
  slots.splice(selectedCard + 1, 0, { ...s, midi: s.midi.slice() });
  selectedCard++;
  renderCards(); paintSelection();
};
$("delBtn").onclick = () => { if (selectedCard !== null) removeCard(selectedCard); };

$("reseedBtn").onclick = () => { seedSlots(); renderCards(); paintSelection(); setStatus("Back to the original chords."); };
$("clearBtn").onclick = () => { slots = []; selectedCard = null; renderCards(); paintSelection(); };
$("vel").oninput = e => { VEL = +e.target.value; $("velNum").textContent = VEL; };
$("humanize").onchange = e => { HUMANIZE = e.target.checked; };
$("smooth").onchange = e => {
  SMOOTH = e.target.checked;
  setStatus(SMOOTH ? "Smooth voices on — new chords flow out of what comes before." : "");
};
$("loopToggle").onchange = e => { LOOPPLAY = e.target.checked; };

document.querySelectorAll(".tabs button[data-tab]").forEach(b => b.onclick = () => {
  activeTab = b.dataset.tab;
  document.querySelectorAll(".tabs button[data-tab]").forEach(x => x.classList.toggle("on", x === b));
  renderTab();
});
$("diceBtn").onclick = reimagine;

$("playBtn").onclick = playWhole;
$("playSecBtn").onclick = playSection;

// ── Apply / cancel (WebView bridge, both platforms) ──────────────────────────
function postToHost(data){
  const msg = { method: "close_and_send", params: [JSON.stringify(data)] };
  if (window.webkit?.messageHandlers?.live) window.webkit.messageHandlers.live.postMessage(msg);
  else if (window.chrome?.webview) window.chrome.webview.postMessage(msg);
}
function updateApply(){
  $("applyBtn").disabled = selStart === null && !editCount;
  $("commitBtn").disabled = selStart === null;
  $("undoCommitBtn").classList.toggle("hidden", !history.length);
  const tag = $("editsTag");
  tag.classList.toggle("hidden", !editCount);
  if (editCount) tag.textContent = "✓ " + editCount + " edit" + (editCount === 1 ? "" : "s") + " locked in";
}

// ── Multi-section editing ────────────────────────────────────────────────────
// "Lock in" bakes the current section into the dialog's working copy of the
// clip — the same razor edit the host used to perform — then re-detects the
// chord blocks and frees the selection for the next section. Nothing touches
// Live until ✦ Drop it in, which sends the whole working note list in one shot.
let editCount = 0;
const history = [];   // pre-edit {notes, loopEnd} snapshots, newest last — in-dialog undo
function pushHistory(){
  history.push({ notes: CLIP.notes, loopEnd: CLIP.loopEnd });
  if (history.length > 32) history.shift();
}
// An empty rewrite means "silence these beats" — one stray click away from
// wiping a section, so empty lock-ins/applies ask for a second click.
let confirmEmptyApply = false;

// Slice originals at the selection boundaries (heads and tails survive) and
// replace the inside with the rewrite, in the working note list.
function bakeSelection(){
  const incoming = renderRegionNotes();
  const kept = [];
  for (const n of CLIP.notes){
    const s = n.startTime, e = s + n.duration;
    if (e <= selStart + EPS || s >= selEnd - EPS){ kept.push(n); continue; }
    if (s < selStart - EPS) kept.push({ pitch: n.pitch, startTime: s, duration: +(selStart - s).toFixed(5), velocity: n.velocity });
    if (e > selEnd + EPS) kept.push({ pitch: n.pitch, startTime: +selEnd.toFixed(5), duration: +(e - selEnd).toFixed(5), velocity: n.velocity });
  }
  CLIP.notes = [...kept, ...incoming].sort((a, b) => a.startTime - b.startTime || a.pitch - b.pitch);
}

function commitSection(){
  if (selStart === null){ setStatus("Select a section first — tap a chord up top."); return; }
  if (!slots.length && !confirmEmptyApply){
    confirmEmptyApply = true;
    setStatus("The rewrite is empty — locking in will silence this section. Click ✓ again to confirm.");
    return;
  }
  stopPlayback();
  pushHistory();
  bakeSelection();
  editCount++;
  selStart = selEnd = null;
  slots = []; selectedCard = null;
  analyzeBlocks();
  paintSelection(); renderAll();
  setStatus("✓ Locked in — nothing's written to Live yet. Pick the next section, or ✦ Drop it in.");
}

function undoCommit(){
  if (!history.length) return;
  stopPlayback();
  const h = history.pop();
  CLIP.notes = h.notes;
  CLIP.loopEnd = h.loopEnd;
  editCount = Math.max(0, editCount - 1);
  selStart = selEnd = null;
  slots = []; selectedCard = null;
  analyzeBlocks();
  paintSelection(); renderAll(); renderClipBadge();
  setStatus("↩ Last edit undone.");
}

// ⧉ ×2 loop — repeat the whole working progression once (2 bars → 4, 4 → 8).
// Notes are sliced to the loop the same way the razor edit does, so a tail
// ringing past the loop end isn't duplicated. Counts as a locked-in edit:
// same undo history, and nothing touches Live until ✦ Drop it in (the host
// extends the clip's loop to match).
const MAX_LOOP_BEATS = 256;   // 64 bars at 4/4 — runaway-click guard
function doubleLoop(){
  const L = span();
  if (L * 2 > MAX_LOOP_BEATS){
    setStatus("That's already " + fmt(L / BEATS_PER_BAR) + " bars — doubling past " + (MAX_LOOP_BEATS / BEATS_PER_BAR) + " is probably a misclick.");
    return;
  }
  stopPlayback();
  pushHistory();
  const copies = [];
  for (const n of CLIP.notes){
    const s = n.startTime, e = s + n.duration;
    if (e <= CLIP.loopStart + EPS || s >= CLIP.loopEnd - EPS) continue;
    const cs = Math.max(s, CLIP.loopStart), ce = Math.min(e, CLIP.loopEnd);
    copies.push({ pitch: n.pitch, startTime: +(cs + L).toFixed(5), duration: +(ce - cs).toFixed(5), velocity: n.velocity });
  }
  CLIP.notes = [...CLIP.notes, ...copies].sort((a, b) => a.startTime - b.startTime || a.pitch - b.pitch);
  CLIP.loopEnd += L;
  editCount++;
  analyzeBlocks();
  paintSelection(); renderAll(); renderClipBadge();
  setStatus("⧉ Doubled to " + fmt(span() / BEATS_PER_BAR) + " bars — the back half is a copy, ready to reimagine. ↩ undoes it.");
}

function apply(){
  if (selStart === null && !editCount){ setStatus("Nothing to drop in yet — select a section and sketch its replacement."); return; }
  if (selStart !== null && !slots.length && !confirmEmptyApply){
    confirmEmptyApply = true;
    setStatus("The selected section's rewrite is empty — applying will clear those beats. Click Apply again if that's what you want.");
    return;
  }
  stopPlayback();
  if (selStart !== null) bakeSelection();   // fold the in-progress section in too
  postToHost({
    action: "apply",
    target: $("applyTarget").value,
    notes: CLIP.notes,
    loopEnd: CLIP.loopEnd,   // ×2 loop may have grown it — host extends the clip to match
  });
}
// Locked-in sections live only in this dialog — closing throws them away,
// so a close with pending work asks once before discarding.
let confirmDiscard = false;
function cancelDialog(){
  if (editCount && !confirmDiscard){
    confirmDiscard = true;
    setStatus("You have " + editCount + " locked-in edit" + (editCount === 1 ? "" : "s") + " not yet in Live — Cancel/Esc again to discard.");
    return;
  }
  stopPlayback();
  postToHost({ action: "cancel" });
}
$("applyBtn").onclick = apply;
$("commitBtn").onclick = commitSection;
$("undoCommitBtn").onclick = undoCommit;
$("dupLoopBtn").onclick = doubleLoop;
$("cancelBtn").onclick = cancelDialog;

document.addEventListener("keydown", e => {
  if (e.key === "Escape"){ cancelDialog(); return; }
  const tag = (e.target.tagName || "").toUpperCase();
  if (tag === "SELECT" || tag === "INPUT" || tag === "TEXTAREA") return;
  if (e.key >= "1" && e.key <= "7"){
    if (selStart !== null){ appendSlot(slotFromDiatonic(+e.key - 1)); e.preventDefault(); }
  } else if (e.key === " "){
    playWhole(); e.preventDefault();
  } else if (e.key === "Enter"){
    if (e.shiftKey){ if (!$("commitBtn").disabled) commitSection(); }
    else if (!$("applyBtn").disabled) apply();
  } else if (e.key === "Backspace" || e.key === "Delete"){
    if (selectedCard !== null){ removeCard(selectedCard); e.preventDefault(); }
  } else if (e.key === "ArrowLeft"){
    if (selectedCard === null) return;
    if (e.shiftKey) moveCard(selectedCard, selectedCard - 1);
    else if (selectedCard > 0) selectCard(selectedCard - 1);
    e.preventDefault();
  } else if (e.key === "ArrowRight"){
    if (selectedCard === null) return;
    if (e.shiftKey) moveCard(selectedCard, selectedCard + 1);
    else if (selectedCard < slots.length - 1) selectCard(selectedCard + 1);
    e.preventDefault();
  }
});

// ── Boot ─────────────────────────────────────────────────────────────────────
buildKeySelectors();
analyzeBlocks();
function renderClipBadge(){ $("clipBadge").textContent = "♪ " + (CLIP.name || "Clip") + " · " + fmt(span() / BEATS_PER_BAR) + " bars"; }
renderClipBadge();
if (LIVE.mode){
  const badge = $("liveBadge");
  badge.textContent = "✦ " + rootLabel(LIVE.rootIndex) + " " + LIVE.mode + " — from Live";
  badge.classList.remove("hidden");
}
$("tempoTag").textContent = "@ " + Math.round(LIVE.tempo || 120) + " BPM";
renderAll();
setStatus("Tap a chord — or drag across the strip — and reimagine it. ✓ Lock in as many sections as you like, then drop them all in at once.");
</script>
</body>
</html>
